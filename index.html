<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Plánovač</title>
<style>
:root{--acc:#CCFF00;--acc2:#3399FF;--red:#FF3366;--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#252525;--border2:#333;--text:#ddd;--muted:#555;--muted2:#888;--font:'SF Mono','Fira Code','Courier New',monospace;--r:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
input,textarea,button{font-family:var(--font);}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}
#header{flex-shrink:0;padding:10px 14px 0;background:var(--bg);border-bottom:1px solid var(--border);z-index:20;}
#mnav{flex-shrink:0;display:flex;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none;}
#mnav::-webkit-scrollbar{display:none;}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:14px;}
#content::-webkit-scrollbar{display:none;}
#bnav{flex-shrink:0;display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--border);background:#090909;padding-bottom:env(safe-area-inset-bottom);}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.htitle{display:flex;align-items:center;gap:6px;}
.htitle span{color:#fff;font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;}
.hactions{display:flex;align-items:center;gap:6px;}
.hmonth{display:flex;align-items:center;gap:6px;padding-bottom:7px;}
.hmonth-name{color:var(--muted2);font-size:11px;min-width:62px;text-align:center;}
.hmonth button{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;}
.bpill{background:transparent;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;padding:0;color:var(--muted);font-size:8px;}
.btn{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:5px 8px;cursor:pointer;color:var(--muted2);font-size:9px;font-weight:700;text-transform:uppercase;display:flex;align-items:center;gap:4px;}
.btn-acc{background:var(--acc);color:#000;border:none;}
.btn-full{width:100%;padding:11px;font-size:11px;border-radius:6px;justify-content:center;margin-bottom:6px;}
.mbtn{padding:6px 8px;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--muted);font-size:8px;font-weight:700;text-transform:uppercase;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.mbtn.on{color:var(--acc);border-bottom-color:var(--acc);}
.nbtn{padding:9px 2px 7px;background:transparent;border:none;border-top:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s;}
.nbtn.on{border-top-color:var(--acc);}
.nbtn svg{width:17px;height:17px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s;}
.nbtn.on svg{stroke:var(--acc);}
.nbtn span{font-size:7px;font-weight:700;color:var(--muted);text-transform:uppercase;transition:color .15s;}
.nbtn.on span{color:var(--acc);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px;}
.card-title{color:var(--muted);font-size:8px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sbox{background:var(--bg3);border-radius:6px;padding:10px;}
.slabel{color:var(--muted);font-size:8px;text-transform:uppercase;margin-bottom:2px;}
.sval{font-size:19px;font-weight:700;line-height:1.1;}
.sunit{font-size:8px;color:var(--muted);}
.fi{background:transparent;border:none;outline:none;color:var(--text);width:100%;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);}
.cgrid-8{display:grid;grid-template-columns:repeat(8,1fr);}
.chdr{background:var(--acc);}
.chdr div{padding:4px 1px;text-align:center;font-size:7px;font-weight:700;color:#000;text-transform:uppercase;}
.chdr8{background:var(--acc);}
.chdr8 div{padding:4px 1px;text-align:center;font-size:7px;font-weight:700;color:#000;text-transform:uppercase;}
.wkcol{background:#1a1a1a!important;color:#fff!important;}
.ccell{border-top:1px solid var(--border);border-right:1px solid var(--border);min-height:66px;padding:3px;display:flex;flex-direction:column;}
.ccell.emp{background:#0a0a0a;}
.daynum{font-size:7px;font-weight:700;color:var(--muted);}
.daynum.tod{color:var(--acc);}
.ctxt{flex:1;background:transparent;border:none;outline:none;resize:none;color:var(--text);font-size:7px;width:100%;line-height:1.4;}
.cchk{width:12px;height:12px;border-radius:2px;border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:flex-end;flex-shrink:0;}
.cchk.dn{background:var(--acc);border-color:var(--acc);}
.cchk.fl{border-color:var(--acc2);}
.ni{font-size:8px;color:var(--text);background:transparent;border:none;outline:none;width:100%;font-family:var(--font);}
.mtbl{width:100%;border-collapse:collapse;font-size:9px;}
.mtbl th{padding:5px 3px;text-align:center;color:var(--muted);font-size:7px;border-bottom:1px solid var(--border);}
.mtbl th:first-child{text-align:left;padding-left:8px;}
.mtbl td{padding:3px;border-bottom:1px solid var(--border);}
.bar-wrap{margin:5px 0;}
.bar-lbl{display:flex;justify-content:space-between;font-size:8px;margin-bottom:2px;}
.bar-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:3px;transition:width .5s;}
.bar-norm{position:absolute;top:0;height:100%;background:rgba(204,255,0,.12);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--bg2);border:1px solid var(--acc);border-radius:var(--r);max-width:420px;width:100%;max-height:88vh;overflow-y:auto;padding:1.25rem;}
.modal h2{color:var(--acc);font-size:13px;text-transform:uppercase;margin-bottom:14px;letter-spacing:1px;}
.banner{background:rgba(255,51,102,.1);border-bottom:1px solid rgba(255,51,102,.3);padding:5px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ymgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.ymcard{background:var(--bg3);border-radius:6px;padding:8px;border:1px solid var(--border);}
.acc{color:var(--acc);}.acc2{color:var(--acc2);}.red{color:var(--red);}
.hidden{display:none!important;}
</style>
</head>
<body>
<div id="app">
  <div id="ubanner" class="banner hidden">
    <span style="font-size:9px;color:var(--red);font-weight:700;">⚠ Záloha: <span id="uage"></span></span>
    <button class="btn btn-acc" style="padding:3px 10px;" onclick="doExport()">Zálohovat</button>
  </div>
  <div id="header">
    <div class="hrow">
      <div class="htitle">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span>Plánovač</span>
        <span style="color:var(--muted);font-size:8px;">v3.5</span>
      </div>
      <div class="hactions">
        <button class="bpill" id="bpill" onclick="doExport()">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span id="blbl">Záloha: —</span>
        </button>
        <button class="btn" onclick="openModal()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          Data
        </button>
      </div>
    </div>
    <div class="hmonth" id="hmonth">
      <button onclick="prevM()">&#8249;</button>
      <span class="hmonth-name" id="mname">Leden</span>
      <button onclick="nextM()">&#8250;</button>
    </div>
  </div>
  <div id="mnav"></div>
  <div id="content"></div>
  <div id="bnav">
    <button class="nbtn" data-t="calendar" onclick="setTab('calendar')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Plán</span></button>
    <button class="nbtn on" data-t="habits" onclick="setTab('habits')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>Návyky</span></button>
    <button class="nbtn" data-t="nutrition" onclick="setTab('nutrition')"><svg viewBox="0 0 24 24"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg><span>Kalorie</span></button>
    <button class="nbtn" data-t="body" onclick="setTab('body')"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>Tělo</span></button>
    <button class="nbtn" data-t="yearly" onclick="setTab('yearly')"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Rok</span></button>
  </div>
</div>
<div id="modal" class="modal-bg hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="mcontent"></div>
</div>
<script>
var YEAR=2026,BK='habit_tracker_last_backup';
var MONTHS=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
var DAYS=['Po','Út','St','Čt','Pá','So','Ne'];
var COLORS=['#FF3366','#22D3EE','#FACC15','#A78BFA','#4ADE80','#FB923C'];

// Storage
function sg(k,fb){try{var v=localStorage.getItem(k);if(!v)return fb;var p=JSON.parse(v);return p==null?fb:p;}catch(e){return fb;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// Data keys — same as original app
function kH(m){return 'habit_tracker_habits_'+m;}
function kD(m){return 'habit_tracker_data_'+m;}
function kN(m){return 'habit_tracker_nutrition_data_'+m;}
function kM(m){return 'habit_tracker_body_metrics_v2_'+m;}
function kF(m){return 'habit_tracker_weekly_focus_v3_'+m;}
var KDEFS='habit_tracker_metric_definitions';

function getH(m){return sg(kH(m),['Vitaminy','Kreatin','Protein']);}
function setH(m,v){ss(kH(m),v);}
function getD(m){return sg(kD(m),{});}
function setD(m,v){ss(kD(m),v);}
function getN(m){return sg(kN(m),{});}
function setN(m,v){ss(kN(m),v);}
function getM(m){return sg(kM(m),{});}
function setMet(m,v){ss(kM(m),v);}
function getDefs(){return sg(KDEFS,[{id:'weight',label:'Váha (kg)',color:COLORS[0]},{id:'waist',label:'Pas (cm)',color:COLORS[1]},{id:'fat',label:'% Tuku',color:COLORS[3]}]);}
function setDefs(v){ss(KDEFS,v);}
function getF(m){
  var s=sg(kF(m),[]);
  var b=[];
  for(var i=0;i<31;i++)b.push({text:'',status:null});
  if(Array.isArray(s)){for(var i=0;i<s.length&&i<31;i++){if(s[i])b[i]=s[i];}}
  return b;
}
function setF(m,v){ss(kF(m),v);}

// Helpers
function daysIn(m){return new Date(YEAR,m+1,0).getDate();}
function firstDow(m){return (new Date(YEAR,m,1).getDay()+6)%7;}
function getSuns(m){
  var r=[],d=new Date(YEAR,m,1);
  var skip=d.getDay()===0?0:7-d.getDay();
  d.setDate(d.getDate()+skip);
  while(d.getMonth()===m){r.push(new Date(d));d.setDate(d.getDate()+7);}
  return r;
}
function getWks(m){
  var dim=daysIn(m),fd=firstDow(m);
  var cells=[];
  for(var i=0;i<fd;i++)cells.push(null);
  for(var i=1;i<=dim;i++)cells.push(i);
  var w=[];
  for(var i=0;i<cells.length;i+=7){
    var row=cells.slice(i,i+7);
    while(row.length<7)row.push(null);
    w.push(row);
  }
  return w;
}
function isCM(m){return new Date().getMonth()===m;}
function todD(){return new Date().getDate();}
function chkSvg(c,s){
  if(s==='done')return '<svg width="'+c+'" height="'+c+'" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
  if(s==='fail')return '<svg width="'+c+'" height="'+c+'" viewBox="0 0 24 24" fill="none" stroke="var(--acc2)" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  return '';
}

// State
var S={tab:'habits',month:new Date().getMonth(),fd:null};

// Backup
function doExport(){
  try{
    var d={};
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.indexOf('habit_tracker_')===0&&k!==BK)d[k]=localStorage.getItem(k);
    }
    if(!Object.keys(d).length){alert('Žádná data.');return;}
    var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    var u=URL.createObjectURL(b),a=document.createElement('a');
    a.href=u;a.download='planovac_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);
    ss(BK,new Date().toISOString());updateBUI();
    var l=document.getElementById('blbl');if(l){l.textContent='✓ Staženo';setTimeout(updateBUI,2000);}
  }catch(e){alert('Export selhal: '+e.message);}
}
function doImport(file){
  var r=new FileReader();
  r.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      Object.keys(d).forEach(function(k){if(k.indexOf('habit_tracker_')===0)localStorage.setItem(k,d[k]);});
      alert('Data načtena!');location.reload();
    }catch(ex){alert('Chyba souboru.');}
  };
  r.readAsText(file);
}
function updateBUI(){
  var v=sg(BK,null);
  var pill=document.getElementById('bpill'),lbl=document.getElementById('blbl');
  var banner=document.getElementById('ubanner'),uage=document.getElementById('uage');
  if(!v){
    if(lbl)lbl.textContent='Záloha: nikdy';
    if(pill)pill.style.color='var(--red)';
    if(banner)banner.classList.remove('hidden');
    if(uage)uage.textContent='nikdy';
    return;
  }
  var days=Math.floor((Date.now()-new Date(v).getTime())/86400000);
  var txt=days===0?'dnes':days===1?'včera':'před '+days+'d';
  if(lbl)lbl.textContent='Záloha: '+txt;
  if(pill)pill.style.color=days>3?'var(--red)':days>0?'var(--muted)':'var(--acc)';
  if(banner){if(days>3){banner.classList.remove('hidden');if(uage)uage.textContent=txt;}else banner.classList.add('hidden');}
}
function autoBackup(){
  var v=sg(BK,null),t=new Date().toISOString().slice(0,10);
  var l=v?new Date(v).toISOString().slice(0,10):null;
  if(l!==t)setTimeout(doExport,3500);
}

// Navigation
function setTab(t){
  S.tab=t;S.fd=null;
  var btns=document.querySelectorAll('.nbtn');
  for(var i=0;i<btns.length;i++)btns[i].classList.toggle('on',btns[i].dataset.t===t);
  var sm=(t==='habits'||t==='nutrition'||t==='calendar');
  document.getElementById('mnav').style.display=sm?'flex':'none';
  document.getElementById('hmonth').style.display=sm?'flex':'none';
  render();
}
function setMonth(m){
  S.month=m;S.fd=null;
  var btns=document.querySelectorAll('.mbtn');
  for(var i=0;i<btns.length;i++)btns[i].classList.toggle('on',+btns[i].dataset.m===m);
  document.getElementById('mname').textContent=MONTHS[m];
  render();
}
function prevM(){if(S.month>0)setMonth(S.month-1);}
function nextM(){if(S.month<11)setMonth(S.month+1);}
function buildMnav(){
  var html='';
  for(var i=0;i<MONTHS.length;i++){
    html+='<button class="mbtn'+(i===S.month?' on':'')+'" data-m="'+i+'" onclick="setMonth('+i+')">'+MONTHS[i].slice(0,3)+'</button>';
  }
  document.getElementById('mnav').innerHTML=html;
}

// Modal
function openModal(){document.getElementById('modal').classList.remove('hidden');document.getElementById('mcontent').innerHTML=diagHTML();}
function closeModal(){document.getElementById('modal').classList.add('hidden');}
function diagHTML(){
  var keys=[],total=0,bad=0;
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(!k||k.indexOf('habit_tracker_')<0||k===BK)continue;
    var v=localStorage.getItem(k)||'';total+=v.length;
    var ok=true;try{JSON.parse(v);}catch(e){ok=false;bad++;}
    keys.push({k:k,ok:ok});
  }
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;"><h2 style="margin:0;">Správa dat</h2><button onclick="closeModal()" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:18px;">✕</button></div>'
    +'<div class="sgrid" style="margin-bottom:12px;">'
    +'<div class="sbox"><div class="slabel">Klíče</div><div class="sval">'+keys.length+'</div></div>'
    +'<div class="sbox"><div class="slabel">Velikost</div><div class="sval">'+Math.round(total/1024)+' KB</div></div>'
    +'<div class="sbox"><div class="slabel">Poškozené</div><div class="sval" style="color:'+(bad>0?'var(--red)':'var(--acc)')+'">'+bad+'</div></div>'
    +'<div class="sbox"><div class="slabel">Status</div><div class="sval acc">OK</div></div>'
    +'</div>'
    +'<button class="btn btn-full btn-acc" onclick="doExport()">💾 Export zálohy</button>'
    +'<label class="btn btn-full" style="cursor:pointer;justify-content:center;">📂 Import zálohy<input type="file" accept=".json" style="display:none;" onchange="doImport(this.files[0])"></label>'
    +(bad?'<button class="btn btn-full" style="background:rgba(255,51,102,.12);color:var(--red);border:1px solid var(--red);" onclick="repairData()">🔧 Opravit poškozené ('+bad+')</button>':'')
    +'<button class="btn btn-full" style="color:var(--muted);" onclick="closeModal()">Zavřít</button>';
}
function repairData(){
  var f=0;
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(!k||k.indexOf('habit_tracker_')<0)continue;
    try{JSON.parse(localStorage.getItem(k));}catch(e){localStorage.removeItem(k);f++;i--;}
  }
  alert('Opraveno '+f+'.');location.reload();
}

// Render
function render(){
  var c=document.getElementById('content'),m=S.month;
  if(S.tab==='habits'){c.innerHTML=rHabits(m);bHabits(m);}
  else if(S.tab==='nutrition'){c.innerHTML=rNutr(m);bNutr(m);}
  else if(S.tab==='body'){c.innerHTML=rBody(m);bBody(m);}
  else if(S.tab==='calendar'){c.innerHTML=rCal(m);bCal(m);}
  else if(S.tab==='yearly'){c.innerHTML=rYear();}
}

// ── HABITS ──
function rHabits(m){
  var habits=getH(m),data=getD(m),dim=daysIn(m),now=isCM(m),td=todD()-1;
  var APD=275/(dim||1),CX=150,CY=150,INNER=30,TW=Math.min(24,(115-INNER)/(habits.length||1));
  var perf={};
  for(var d=0;d<dim;d++){
    var allDone=habits.length>0;
    for(var h=0;h<habits.length;h++){if(data[h+'-'+d]!=='done'){allDone=false;break;}}
    if(allDone)perf[d]=true;
  }
  var stats=[];
  for(var h=0;h<habits.length;h++){var n=0;for(var d=0;d<dim;d++)if(data[h+'-'+d]==='done')n++;stats.push(Math.round(n/dim*100));}

  // Arc path builder
  function arcPath(rI,rO,sA,eA){
    var sR=(sA-90)*Math.PI/180,eR=(eA-90)*Math.PI/180,k=(4/3)*Math.tan((eR-sR)/4);
    var p0x=CX+rO*Math.cos(sR),p0y=CY+rO*Math.sin(sR);
    var p1x=p0x-rO*k*Math.sin(sR),p1y=p0y+rO*k*Math.cos(sR);

      +(habits.length>1?'<button class="del-habit" data-i="'+i+'" style="pointer-events:auto;background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:0 2px;line-height:1;">✕</button>':'')

    for(var hi=0;hi<habits.length;hi++){

function bHabits(m){
  var habits=getH(m),data=getD(m),dim=daysIn(m);
  var els=document.querySelectorAll('.rs');
  for(var i=0;i<els.length;i++){
    els[i].addEventListener('click',function(){
      var h=+this.dataset.h,d=+this.dataset.d,k=h+'-'+d,cur=data[k];
      data[k]=!cur?'done':cur==='done'?'fail':null;
      if(!data[k])delete data[k];
      setD(m,data);S.fd=d;render();
    });
  }
  var dls=document.querySelectorAll('.dl');
  for(var i=0;i<dls.length;i++){
    dls[i].addEventListener('click',function(){
      var d=+this.dataset.day;S.fd=S.fd===d?null:d;render();
    });
  }
  var fts=document.querySelectorAll('.ft');
  for(var i=0;i<fts.length;i++){
    fts[i].addEventListener('click',function(){
      var h=+this.dataset.h,d=+this.dataset.d,k=h+'-'+d,cur=data[k];
      data[k]=!cur?'done':cur==='done'?'fail':null;
      if(!data[k])delete data[k];
      setD(m,data);render();
    });
  }
  var hns=document.querySelectorAll('.hn');
  for(var i=0;i<hns.length;i++){
    hns[i].addEventListener('input',function(){habits[+this.dataset.i]=this.value;setH(m,habits);});
  }
  var dels=document.querySelectorAll('.del-habit');
  for(var i=0;i<dels.length;i++){
    dels[i].addEventListener('click',function(){
      var idx=+this.dataset.i;
      if(habits.length<=1)return;
      // Odstraň návyk a jeho data
      habits.splice(idx,1);
      // Přečísluj data — všechny klíče h-d kde h>idx snížit o 1
      var newData={};
      var keys2=Object.keys(data);
      for(var j=0;j<keys2.length;j++){
        var parts=keys2[j].split('-'),h2=+parts[0],d2=+parts[1];
        if(h2===idx)continue; // mazaný návyk — skip
        var newH=h2>idx?h2-1:h2;
        newData[newH+'-'+d2]=data[keys2[j]];
      }
      setH(m,habits);setD(m,newData);render();
    });
  }
  var adh=document.getElementById('adh');
  if(adh)adh.addEventListener('click',function(){if(habits.length<14){habits.push('');setH(m,habits);render();}});
  var rmh=document.getElementById('rmh');
  if(rmh)rmh.addEventListener('click',function(){if(habits.length>1){habits.pop();setH(m,habits);render();}});
  var cph=document.getElementById('cph');
  if(cph)cph.addEventListener('click',function(){
    var p=getH(m-1);
    if(confirm('Načíst '+p.length+' návyků z '+MONTHS[m-1]+'?')){setH(m,p);render();}
  });
  var ct=document.getElementById('center-touch');
  if(ct)ct.addEventListener('click',function(){S.fd=S.fd!==null?null:(isCM(m)?todD()-1:0);render();});
  var pd=document.getElementById('prev-day');
  if(pd)pd.addEventListener('click',function(){if(S.fd>0){S.fd--;render();}});
  var nd=document.getElementById('next-day');
  if(nd)nd.addEventListener('click',function(){if(S.fd<dim-1){S.fd++;render();}});
}

// ── NUTRITION ──
function rNutr(m){
  var data=getN(m),dim=daysIn(m),ws=getWks(m),now=isCM(m),td=todD();
  var sI=0,cI=0,sO=0,cO=0;
  for(var d=0;d<dim;d++){
    var vI=parseInt(data[d]?data[d].kcalIn:''),vO=parseInt(data[d]?data[d].kcalOut:'');
    if(!isNaN(vI)){sI+=vI;cI++;}if(!isNaN(vO)){sO+=vO;cO++;}
  }
  var aI=cI?Math.round(sI/cI):0,aO=cO?Math.round(sO/cO):0,diff=sI-sO;
  var maxK=2500,lf=-1;
  for(var d=0;d<dim;d++)if(data[d]&&(data[d].kcalIn||data[d].kcalOut))lf=d;
  var pI=[],pO=[];
  for(var d=0;d<=lf;d++){
    var vI=parseInt(data[d]?data[d].kcalIn:''),vO=parseInt(data[d]?data[d].kcalOut:'');
    if(!isNaN(vI)){pI.push({x:d,y:vI});if(vI>maxK)maxK=vI;}
    if(!isNaN(vO)){pO.push({x:d,y:vO});if(vO>maxK)maxK=vO;}
  }
  maxK*=1.1;var W=300,H=65,sx=W/(dim-1||1);
  function mp(pts,fy){if(!pts.length)return '';var s='';for(var i=0;i<pts.length;i++)s+=(i===0?'M':'L')+' '+(pts[i].x*sx).toFixed(1)+' '+fy(pts[i].y).toFixed(1)+' ';return s;}
  var pathI=mp(pI,function(y){return H-(y/maxK)*H;}),pathO=mp(pO,function(y){return H-(y/maxK)*H;});

  var calRows='';
  for(var wI=0;wI<ws.length;wI++){
    var w=ws[wI],tI=0,tO=0;
    for(var di=0;di<w.length;di++){
      var d=w[di];if(!d)continue;
      var vI=parseInt(data[d-1]?data[d-1].kcalIn:'0')||0;
      var vO=parseInt(data[d-1]?data[d-1].kcalOut:'0')||0;
      if(vI>0||vO>0){tI+=vI;tO+=vO;}
    }
    var wDiff=tI-tO;
    for(var di=0;di<w.length;di++){
      var d=w[di];
      if(!d){calRows+='<div class="ccell emp"></div>';continue;}
      var iV=data[d-1]?data[d-1].kcalIn||'':'',oV=data[d-1]?data[d-1].kcalOut||'':'';
      var df=(parseInt(iV)||0)-(parseInt(oV)||0),has=iV||oV,isT=now&&d===td;
      calRows+='<div class="ccell" style="'+(isT?'background:var(--bg3);':'')+'">'
        +'<span class="daynum '+(isT?'tod':'')+'">'+d+'</span>'
        +'<input class="ni ni-in acc" data-d="'+(d-1)+'" placeholder="in" value="'+iV+'" type="number">'
        +'<input class="ni ni-out acc2" data-d="'+(d-1)+'" placeholder="out" value="'+oV+'" type="number">'
        +(has?'<div style="font-size:7px;color:'+(df>0?'var(--red)':'var(--acc)')+';text-align:right;margin-top:auto;">'+(df>0?'+':'')+df+'</div>':'')
        +'</div>';
    }
    calRows+='<div class="ccell" style="background:#0f0f0f;justify-content:center;gap:2px;">'
      +'<div style="font-size:6px;color:var(--muted);">Σ kcal</div>'
      +'<div style="font-size:9px;font-weight:700;color:'+(wDiff>0?'var(--red)':'var(--acc)')+';">'+(wDiff>0?'+':'')+wDiff+'</div>'
      +'</div>';
  }

  var html='<div class="sgrid">'
    +'<div class="sbox"><div class="slabel">Ø Příjem</div><div class="sval acc">'+aI+'</div><div class="sunit">kcal/den</div></div>'
    +'<div class="sbox"><div class="slabel">Ø Výdej</div><div class="sval acc2">'+aO+'</div><div class="sunit">kcal/den</div></div>'
    +'</div>'
    +'<div class="sbox" style="margin-bottom:10px;"><div class="slabel">Celkový deficit</div>'
    +'<div class="sval '+(diff<0?'acc':'red')+'">'+(diff>0?'+':'')+diff+' <span class="sunit">kcal</span></div></div>';
  if(pathI||pathO){
    html+='<div class="card"><div style="display:flex;gap:10px;margin-bottom:6px;">'
      +'<div style="display:flex;align-items:center;gap:3px;font-size:8px;color:var(--muted);"><div style="width:10px;height:2px;background:var(--acc);"></div>Příjem</div>'
      +'<div style="display:flex;align-items:center;gap:3px;font-size:8px;color:var(--muted);"><div style="width:10px;height:2px;background:var(--acc2);"></div>Výdej</div>'
      +'</div>'
      +'<svg viewBox="0 0 300 65" style="width:100%;height:55px;" preserveAspectRatio="none">'
      +(pathI?'<path d="'+pathI+'" fill="none" stroke="var(--acc)" stroke-width="1.5" opacity=".8"/>'  :'')
      +(pathO?'<path d="'+pathO+'" fill="none" stroke="var(--acc2)" stroke-width="1.5" opacity=".8"/>':'')
      +'</svg></div>';
  }
  html+='<div class="card" style="padding:0;overflow:hidden;">'
    +'<div class="cgrid-8 chdr8">';
  for(var i=0;i<DAYS.length;i++)html+='<div>'+DAYS[i]+'</div>';
  html+='<div class="wkcol" style="padding:4px 1px;text-align:center;font-size:7px;font-weight:700;">Týden</div>'
    +'</div>'
    +'<div class="cgrid-8" style="border-left:1px solid var(--border);">'+calRows+'</div>'
    +'</div>';
  return html;
}

// ── BODY ──
function rBody(m){
  var metrics=getM(m),defs=getDefs(),ss2=getSuns(m);
  var lat={};
  for(var di=0;di<defs.length;di++){
    for(var i=4;i>=0;i--){
      var v=parseFloat(metrics[i]?metrics[i][defs[di].id]:NaN);
      if(!isNaN(v)){lat[defs[di].id]=v;break;}
    }
  }
  var ranges={weight:{min:60,max:120,norm:[70,95]},waist:{min:60,max:110,norm:[70,88]},muscle:{min:25,max:55,norm:[36,46]},fat:{min:4,max:32,norm:[10,18]}};
  var bars='';
  for(var di=0;di<defs.length;di++){
    var def=defs[di],v=lat[def.id],r=ranges[def.id];
    if(v===undefined||!r)continue;
    var pct=Math.min(100,Math.max(0,(v-r.min)/(r.max-r.min)*100));
    var nL=(r.norm[0]-r.min)/(r.max-r.min)*100,nW=(r.norm[1]-r.norm[0])/(r.max-r.min)*100;
    bars+='<div class="bar-wrap"><div class="bar-lbl"><span style="color:'+def.color+';font-weight:700;">'+def.label+'</span><span style="color:var(--text);font-weight:700;">'+v+'</span></div>'
      +'<div class="bar-track"><div class="bar-norm" style="left:'+nL+'%;width:'+nW+'%;"></div><div class="bar-fill" style="width:'+pct+'%;background:'+def.color+';"></div></div></div>';
  }
  var H=75,W=300,lines='';
  for(var di=0;di<defs.length;di++){
    var def=defs[di],pts=[],vals=[];
    for(var i=0;i<5;i++){var v=parseFloat(metrics[i]?metrics[i][def.id]:NaN);if(!isNaN(v)){pts.push({x:i,y:v});vals.push(v);}}
    if(!vals.length)continue;
    var min=Math.min.apply(null,vals)*.96,max=Math.max.apply(null,vals)*1.04,rng=max-min||1,sx=W/4;
    var path='';for(var i=0;i<pts.length;i++)path+=(i===0?'M':'L')+' '+(pts[i].x*sx).toFixed(1)+' '+(H-((pts[i].y-min)/rng)*H).toFixed(1)+' ';
    lines+='<path d="'+path+'" fill="none" stroke="'+def.color+'" stroke-width="2"/>';
    for(var i=0;i<pts.length;i++){
      var cx=(pts[i].x*sx).toFixed(1),cy=(H-((pts[i].y-min)/rng)*H).toFixed(1);
      lines+='<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="var(--bg)" stroke="'+def.color+'" stroke-width="1.5"/>';
      lines+='<text x="'+cx+'" y="'+(H-((pts[i].y-min)/rng)*H-8).toFixed(1)+'" text-anchor="middle" font-size="7" fill="'+def.color+'" font-weight="700">'+pts[i].y+'</text>';
    }
  }
  var tableRows='';
  for(var di=0;di<defs.length;di++){
    var def=defs[di];
    tableRows+='<tr><td style="padding:5px 4px 5px 8px;"><div style="display:flex;align-items:center;gap:5px;">'
      +'<div style="width:7px;height:7px;border-radius:50%;background:'+def.color+';flex-shrink:0;"></div>'
      +'<input class="mdef-lbl fi" data-id="'+def.id+'" value="'+def.label+'" style="font-size:8px;font-weight:700;width:78px;">'
      +(defs.length>1?'<button class="mdef-del" data-id="'+def.id+'" style="background:transparent;border:none;cursor:pointer;color:var(--muted);margin-left:auto;font-size:10px;">✕</button>':'')
      +'</div></td>';
    for(var i=0;i<5;i++){
      var val=metrics[i]?metrics[i][def.id]||'':'';
      tableRows+='<td><input class="mval fi" data-id="'+def.id+'" data-i="'+i+'" type="number" placeholder="—" value="'+val+'" style="color:'+def.color+';font-size:9px;font-weight:700;text-align:center;"></td>';
    }
    tableRows+='</tr>';
  }
  var sunHdrs='';
  for(var i=0;i<5;i++){
    var s=ss2[i];sunHdrs+=s?'<th>'+s.getDate()+'.'+(s.getMonth()+1)+'.</th>':'<th>—</th>';
  }
  var html=(bars?'<div class="card"><div class="card-title">Aktuální hodnoty</div>'+bars+'</div>':'<div class="card"><div style="color:var(--muted);font-size:11px;text-align:center;padding:8px;">Zatím žádná data — zadej první měření níže</div></div>');
  if(lines)html+='<div class="card"><div class="card-title">Vývoj v měsíci</div><svg viewBox="0 0 300 75" style="width:100%;height:70px;" preserveAspectRatio="none">'+lines+'</svg></div>';
  html+='<div class="card" style="padding:0;overflow:hidden;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg3);border-bottom:1px solid var(--border);">'
    +'<span style="font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;">Nedělní měření</span>'
    +'<button id="admet" class="btn" '+(defs.length>=6?'disabled':'')+'>+ Přidat</button>'
    +'</div><div style="overflow-x:auto;"><table class="mtbl" style="min-width:300px;">'
    +'<thead><tr><th style="text-align:left;padding-left:8px;">Metrika</th>'+sunHdrs+'</tr></thead>'
    +'<tbody>'+tableRows+'</tbody></table></div></div>';
  return html;
}
function bBody(m){
  var metrics=getM(m),defs=getDefs();
  var mvals=document.querySelectorAll('.mval');
  for(var i=0;i<mvals.length;i++){
    mvals[i].addEventListener('input',function(){
      var id=this.dataset.id,idx=+this.dataset.i;
      if(!metrics[idx])metrics[idx]={};
      metrics[idx][id]=this.value;setMet(m,metrics);
      clearTimeout(this._t);this._t=setTimeout(function(){render();},1100);
    });
  }
  var lbls=document.querySelectorAll('.mdef-lbl');
  for(var i=0;i<lbls.length;i++){
    lbls[i].addEventListener('input',function(){
      var id=this.dataset.id;
      for(var j=0;j<defs.length;j++)if(defs[j].id===id){defs[j].label=this.value;break;}
      setDefs(defs);
    });
  }
  var dels=document.querySelectorAll('.mdef-del');
  for(var i=0;i<dels.length;i++){
    dels[i].addEventListener('click',function(){
      var id=this.dataset.id;
      defs=defs.filter(function(d){return d.id!==id;});
      setDefs(defs);render();
    });
  }
  var admet=document.getElementById('admet');
  if(admet)admet.addEventListener('click',function(){
    if(defs.length<6){
      defs.push({id:'m_'+Date.now(),label:'Nová',color:COLORS[defs.length%COLORS.length]});
      setDefs(defs);render();
    }
  });
}

// ── CALENDAR ──
function rCal(m){
  var focus=getF(m),ws=getWks(m),now=isCM(m),td=todD();
  var rows='';
  for(var wi=0;wi<ws.length;wi++){
    var w=ws[wi];
    for(var di=0;di<w.length;di++){
      var d=w[di];
      if(!d){rows+='<div class="ccell emp"></div>';continue;}
      var fd=focus[d-1]||{text:'',status:null},isT=now&&d===td;
      rows+='<div class="ccell" style="'+(isT?'background:var(--bg3);':'')+'">'
        +'<span class="daynum '+(isT?'tod':'')+'">'+d+'</span>'
        +'<textarea class="ctxt ftxt" data-d="'+(d-1)+'" placeholder="">'+((fd.text)||'')+'</textarea>'
        +'<div class="cchk '+(fd.status==='done'?'dn':fd.status==='fail'?'fl':'')+' fchk" data-d="'+(d-1)+'">'+chkSvg(8,fd.status)+'</div>'
        +'</div>';
    }
  }
  return '<div class="card" style="padding:0;overflow:hidden;">'
    +'<div class="cgrid chdr">'+(DAYS.map(function(d){return '<div>'+d+'</div>';}).join(''))+'</div>'
    +'<div class="cgrid" style="border-left:1px solid var(--border);">'+rows+'</div>'
    +'</div>';
}
function bCal(m){
  var focus=getF(m);
  var txts=document.querySelectorAll('.ftxt');
  for(var i=0;i<txts.length;i++){
    txts[i].addEventListener('input',function(){
      var d=+this.dataset.d;
      if(!focus[d])focus[d]={text:'',status:null};
      focus[d].text=this.value;setF(m,focus);
    });
  }
  var chks=document.querySelectorAll('.fchk');
  for(var i=0;i<chks.length;i++){
    chks[i].addEventListener('click',function(){
      var d=+this.dataset.d;
      if(!focus[d])focus[d]={text:'',status:null};
      var old=focus[d].status;
      focus[d].status=old==='done'?'fail':old==='fail'?null:'done';
      setF(m,focus);render();
    });
  }
}

// ── YEARLY ──
function rYear(){
  var defs=getDefs(),lastM=0;
  var all=[];
  for(var i=0;i<MONTHS.length;i++){all.push({n:getN(i),h:getD(i),m:getM(i)});}
  for(var i=0;i<all.length;i++){
    if(Object.keys(all[i].n).length+Object.keys(all[i].h).length+Object.keys(all[i].m).length>0)lastM=i;
  }
  var dayCount=0,maxK=2500,pI=[],pO=[],pW=[],wVals=[];
  for(var idx=0;idx<=lastM;idx++){
    var md=all[idx],dim=daysIn(idx);
    for(var d=0;d<dim;d++){
      var vI=parseInt(md.n[d]?md.n[d].kcalIn:''),vO=parseInt(md.n[d]?md.n[d].kcalOut:'');
      if(!isNaN(vI)){pI.push({x:dayCount+d,y:vI});if(vI>maxK)maxK=vI;}
      if(!isNaN(vO)){pO.push({x:dayCount+d,y:vO});if(vO>maxK)maxK=vO;}
    }
    var sd=new Date(YEAR,idx,1);sd.setDate(sd.getDate()+(sd.getDay()===0?0:7-sd.getDay()));var wi=0;
    while(sd.getMonth()===idx){
      var w=parseFloat(md.m[wi]?md.m[wi][defs[0]?defs[0].id:'weight']:NaN);
      if(!isNaN(w)){pW.push({x:dayCount+sd.getDate()-1,y:w});wVals.push(w);}
      sd.setDate(sd.getDate()+7);wi++;
    }
    dayCount+=dim;
  }
  maxK*=1.1;
  var minW=wVals.length?Math.min.apply(null,wVals)*.97:50;
  var maxW=wVals.length?Math.max.apply(null,wVals)*1.03:100;
  var rW=maxW-minW||1;
  var W=300,H=100,sx=W/(dayCount||1);
  function mp(pts,fy){if(!pts.length)return '';var s='';for(var i=0;i<pts.length;i++)s+=(i===0?'M':'L')+' '+(pts[i].x*sx).toFixed(1)+' '+fy(pts[i].y).toFixed(1)+' ';return s;}
  var pathI=mp(pI,function(y){return H-(y/maxK)*H;});
  var pathO=mp(pO,function(y){return H-(y/maxK)*H;});
  var pathW=mp(pW,function(y){return H-((y-minW)/rW)*H;});
  var wc=defs[0]?defs[0].color:COLORS[0];

  var wDots='';
  for(var i=0;i<pW.length;i++){
    var cx=(pW[i].x*sx).toFixed(1),cy=(H-((pW[i].y-minW)/rW)*H).toFixed(1);
    wDots+='<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="var(--bg)" stroke="'+wc+'" stroke-width="1.5"/>';
    wDots+='<text x="'+cx+'" y="'+(H-((pW[i].y-minW)/rW)*H-8).toFixed(1)+'" text-anchor="middle" font-size="6" fill="'+wc+'" font-weight="700">'+pW[i].y+'</text>';
  }

  var mCards='';
  for(var i=0;i<MONTHS.length;i++){
    var nd=getN(i),hd=getD(i),ha=getH(i),dim=daysIn(i);
    var logged=0,hdn=0,htot=0;
    for(var d=0;d<dim;d++)if(nd[d]&&(nd[d].kcalIn||nd[d].kcalOut))logged++;
    for(var h=0;h<ha.length;h++){for(var d=0;d<dim;d++){htot++;if(hd[h+'-'+d]==='done')hdn++;}}
    var has=logged>0||hdn>0,pct=htot?Math.round(hdn/htot*100):0;
    mCards+='<div class="ymcard" style="border-color:'+(has?'var(--border)':'#111')+';">'
      +'<div style="font-size:8px;font-weight:700;color:'+(has?'var(--acc)':'#252525')+';text-transform:uppercase;margin-bottom:3px;">'+MONTHS[i].slice(0,3)+'</div>'
      +(has?'<div style="font-size:7px;color:var(--muted);">Kcal: <span style="color:#777">'+logged+'/'+dim+'d</span></div><div style="font-size:7px;color:var(--muted);">Návyky: <span style="color:var(--acc)">'+pct+'%</span></div>':'<div style="font-size:7px;color:#222;">—</div>')
      +'</div>';
  }

  var mLabels='';
  for(var i=0;i<=lastM;i++)mLabels+='<div style="flex:1;text-align:center;font-size:5px;color:#2a2a2a;text-transform:uppercase;">'+MONTHS[i].slice(0,3)+'</div>';

  return '<div class="sgrid" style="margin-bottom:10px;">'
    +'<button class="btn btn-acc btn-full" style="margin:0;" onclick="doExport()">💾 Export dat</button>'
    +'<label class="btn btn-full" style="cursor:pointer;justify-content:center;margin:0;">📂 Import zálohy<input type="file" accept=".json" style="display:none;" onchange="doImport(this.files[0])"></label>'
    +'</div>'
    +'<div class="card"><div class="card-title">Metabolický vývoj '+YEAR+'</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:6px;">'
    +'<div style="display:flex;align-items:center;gap:3px;font-size:8px;color:var(--muted);"><div style="width:10px;height:2px;background:var(--acc);opacity:.6;"></div>Příjem</div>'
    +'<div style="display:flex;align-items:center;gap:3px;font-size:8px;color:var(--muted);"><div style="width:10px;height:2px;background:var(--acc2);opacity:.6;"></div>Výdej</div>'
    +'<div style="display:flex;align-items:center;gap:3px;font-size:8px;color:var(--muted);"><div style="width:7px;height:7px;border-radius:50%;background:'+wc+';"></div>Váha</div>'
    +'</div>'
    +'<svg viewBox="0 0 300 100" style="width:100%;height:85px;" preserveAspectRatio="none">'
    +(pathI?'<path d="'+pathI+'" fill="none" stroke="var(--acc)" stroke-width="1" opacity=".5"/>':'')
    +(pathO?'<path d="'+pathO+'" fill="none" stroke="var(--acc2)" stroke-width="1" opacity=".5"/>':'')
    +(pathW?'<path d="'+pathW+'" fill="none" stroke="'+wc+'" stroke-width="2.5"/>':'')
    +wDots
    +'</svg>'
    +'<div style="display:flex;margin-top:3px;">'+mLabels+'</div>'
    +'</div>'
    +'<div class="card"><div class="card-title">Přehled po měsících</div><div class="ymgrid">'+mCards+'</div></div>';
}

  setTimeout(function(){var a=document.querySelector('.mbtn.on');if(a)a.scrollIntoView({inline:'center',behavior:'smooth'});},100);
