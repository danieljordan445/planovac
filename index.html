<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e1116">
<title>Plánovač</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,500;0,700;0,800;1,800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1116; --s1:#151a21; --s2:#1c222b; --s3:#242c37;
  --line:#27303a; --line2:#323d4a;
  --ink:#e9eef3; --mut:#8b97a6; --dim:#586473;
  --brass:#2fdcc8; --brass-soft:rgba(47,220,200,.12); --brass-line:rgba(47,220,200,.4);
  --blue:#9aa9bb; --blue-soft:rgba(154,169,187,.14);
  --red:#f06a5e; --red-soft:rgba(240,106,94,.13);
  --green:#5ee08f; --green-soft:rgba(94,224,143,.13);
  --gold:#ffd97a;
  --r:16px; --r-sm:10px;
  --ease:cubic-bezier(.23,1,.32,1);
  --font-d:'Archivo',sans-serif; --font-b:'Instrument Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--font-b);overflow:hidden;font-size:15px;}
input,textarea,button,select{font-family:var(--font-b);font-size:inherit;color:var(--ink);}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}
/* ── header ── */
#hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;padding-top:calc(14px + env(safe-area-inset-top));}
.brand{font-family:var(--font-d);font-weight:800;font-style:italic;font-size:17px;letter-spacing:-.02em;}
.brand em{color:var(--brass);font-style:inherit;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.phase-chip{font-family:var(--font-d);font-weight:700;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass);border:1px solid var(--brass-line);background:var(--brass-soft);border-radius:999px;padding:5px 11px;cursor:pointer;}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--s1);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s var(--ease);}
.icon-btn:active{transform:scale(.94);}
.icon-btn svg{width:16px;height:16px;stroke:var(--mut);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
/* ── content ── */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:4px 18px 24px;}
#content::-webkit-scrollbar{display:none;}
.view{animation:viewIn .22s var(--ease);}
@keyframes viewIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@media(prefers-reduced-motion:reduce){.view{animation:viewFade .2s ease;}@keyframes viewFade{from{opacity:0;}to{opacity:1;}}}
/* ── bottom nav ── */
#bnav{flex-shrink:0;display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--line);background:rgba(11,14,18,.92);backdrop-filter:blur(14px);padding-bottom:env(safe-area-inset-bottom);}
.nbtn{padding:10px 2px 8px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nbtn svg{width:19px;height:19px;stroke:var(--dim);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s ease;}
.nbtn span{font-size:9px;font-weight:600;color:var(--dim);letter-spacing:.04em;transition:color .15s ease;}
.nbtn.on svg{stroke:var(--brass);}
.nbtn.on span{color:var(--brass);}
/* ── cards & primitives ── */
.card{background:var(--s1);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.card-t{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.num{font-family:var(--font-d);font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
.big{font-size:30px;line-height:1;}
.mid{font-size:19px;line-height:1.1;}
.unit{font-size:11px;font-weight:500;color:var(--mut);font-family:var(--font-b);letter-spacing:0;}
.sub{font-size:11.5px;color:var(--mut);line-height:1.45;}
.delta{font-family:var(--font-d);font-weight:700;font-size:11px;padding:2px 7px;border-radius:6px;font-variant-numeric:tabular-nums;}
.d-up{color:var(--brass);background:var(--brass-soft);}
.d-down{color:var(--blue);background:var(--blue-soft);}
.d-good{color:var(--green);background:var(--green-soft);}
.d-bad{color:var(--red);background:var(--red-soft);}
.d-neu{color:var(--mut);background:var(--s2);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{background:var(--s2);border:1px solid var(--line2);border-radius:var(--r-sm);padding:11px 14px;cursor:pointer;color:var(--ink);font-weight:600;font-size:13px;text-align:center;transition:transform .12s var(--ease);}
.btn:active{transform:scale(.97);}
.btn-brass{background:var(--brass);border-color:var(--brass);color:#04201c;}
.btn-ghost{background:transparent;color:var(--mut);}
.btn-full{width:100%;display:block;margin-bottom:8px;}
.chips{display:flex;gap:6px;}
.chip{font-family:var(--font-d);font-weight:700;font-size:10.5px;letter-spacing:.06em;padding:5px 10px;border-radius:999px;border:1px solid var(--line2);background:transparent;color:var(--mut);cursor:pointer;}
.chip.on{background:var(--ink);border-color:var(--ink);color:#15151a;}
/* ── inputs ── */
.field{background:var(--s2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;}
.field label{display:block;font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:3px;}
.field input{width:100%;background:transparent;border:none;outline:none;font-family:var(--font-d);font-weight:700;font-size:20px;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.field input::placeholder{color:var(--dim);font-weight:500;}
.field.f-in{border-color:rgba(47,220,200,.35);}
.field.f-out{border-color:rgba(154,169,187,.35);}
.field:focus-within{border-color:var(--brass);}
/* ── date stepper ── */
.stepper{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.stepper .arr{width:38px;height:38px;border-radius:11px;background:var(--s1);border:1px solid var(--line);color:var(--mut);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s var(--ease);}
.stepper .arr:active{transform:scale(.92);}
.stepper .arr:disabled{opacity:.3;}
.stepper .lbl{text-align:center;}
.stepper .lbl b{font-family:var(--font-d);font-weight:800;font-size:16px;display:block;}
.stepper .lbl span{font-size:10.5px;color:var(--mut);}
/* ── rows ── */
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:none;}
.row .rl{font-size:12.5px;color:var(--mut);}
.row .rv{font-family:var(--font-d);font-weight:700;font-size:13.5px;font-variant-numeric:tabular-nums;}
/* ── phase rail (signature) ── */
.rail-wrap{padding:6px 4px 2px;}
.rail-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.rail-svg{width:100%;height:46px;display:block;}
.rail-foot{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:2px;font-variant-numeric:tabular-nums;}
/* ── metric rows (Tělo) ── */
.met{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer;}
.met:last-child{border-bottom:none;}
.met .m-name{flex:0 0 86px;font-size:12px;color:var(--mut);font-weight:500;}
.met .m-spark{flex:1;height:22px;}
.met .m-val{flex:0 0 auto;text-align:right;}
.met-detail{padding:8px 0 14px;border-bottom:1px solid var(--line);animation:viewIn .2s var(--ease);}
/* ── habits ── */
.ring-wrap{position:relative;width:100%;max-width:330px;margin:0 auto;}
.h-row{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--s2);border-radius:11px;margin-bottom:6px;cursor:pointer;transition:transform .1s var(--ease);}
.h-row:active{transform:scale(.985);}
.h-check{width:23px;height:23px;border-radius:7px;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.h-check.dn{background:var(--brass);border-color:var(--brass);}
.h-check.fl{border-color:var(--blue);}
.h-name-inp{background:transparent;border:none;outline:none;font-size:13px;font-weight:500;width:100%;}
/* ── modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(7,10,13,.8);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--s1);border:1px solid var(--line2);border-radius:20px 20px 0 0;max-width:480px;width:100%;max-height:86vh;overflow-y:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom));animation:sheetIn .28s cubic-bezier(.32,.72,0,1);}
@keyframes sheetIn{from{transform:translateY(40px);opacity:.4;}to{transform:none;opacity:1;}}
.modal h2{font-family:var(--font-d);font-weight:800;font-size:16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal h2 button{background:transparent;border:none;color:var(--dim);font-size:20px;cursor:pointer;line-height:1;}
textarea.ta{width:100%;min-height:96px;background:var(--s2);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:11px;font-family:ui-monospace,monospace;color:var(--ink);outline:none;resize:vertical;}
.note{font-size:10.5px;color:var(--dim);line-height:1.5;margin:6px 0 10px;}
.toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);background:var(--s3);border:1px solid var(--line2);color:var(--ink);font-size:12px;font-weight:600;padding:9px 16px;border-radius:999px;z-index:200;opacity:0;transition:opacity .18s var(--ease),transform .18s var(--ease);pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.hidden{display:none!important;}
.brass{color:var(--brass);}.blue{color:var(--blue);}.red{color:var(--red);}.green{color:var(--green);}.mut{color:var(--mut);}
/* ── calendar table ── */
.cal-table{width:100%;border-collapse:collapse;}
.cal-table th{text-align:right;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);padding:0 3px 7px;}
.cal-table th:first-child{text-align:left;}
.cal-table td{padding:7px 3px;border-top:1px solid var(--line);font-family:var(--font-d);font-weight:700;font-size:12px;font-variant-numeric:tabular-nums;text-align:right;}
.cal-table td:first-child{text-align:left;font-weight:600;}
.cal-table tr{transition:background .1s ease;}
.cal-table tr:active{background:var(--s2);}
.cal-row-today td{color:var(--brass);}
.cal-row-today{background:var(--brass-soft);}
.cal-dow{color:var(--dim);font-weight:400;font-size:10px;}
.cal-empty{color:var(--dim);font-weight:400;}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
/* ── coaching banners ── */
.banner{display:flex;gap:11px;align-items:flex-start;border-radius:14px;padding:13px 15px;margin-bottom:12px;border:1px solid;}
.banner .b-ico{font-size:17px;line-height:1.1;flex-shrink:0;}
.banner .b-txt{flex:1;font-size:12.5px;line-height:1.5;}
.banner .b-txt b{font-family:var(--font-d);font-weight:700;}
.ban-warn{background:var(--red-soft);border-color:rgba(240,106,94,.4);}
.ban-warn b{color:var(--red);}
.ban-note{background:var(--brass-soft);border-color:var(--brass-line);}
.ban-note b{color:var(--brass);}
.ban-ok{background:var(--green-soft);border-color:rgba(94,224,143,.35);}
.ban-ok b{color:var(--green);}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="brand">Pláno<em>vač</em></div>
    <div class="hdr-right">
      <button class="phase-chip" id="phaseChip" onclick="openSettings()">—</button>
      <button class="icon-btn" onclick="openSettings()" aria-label="Nastavení">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
  <div id="content"></div>
  <div id="bnav">
    <button class="nbtn on" data-t="today" onclick="setTab('today')"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg><span>Dnes</span></button>
    <button class="nbtn" data-t="trend" onclick="setTab('trend')"><svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg><span>Trend</span></button>
    <button class="nbtn" data-t="body" onclick="setTab('body')"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="3"/><path d="M5 22v-5a7 7 0 0 1 14 0v5"/></svg><span>Tělo</span></button>
    <button class="nbtn" data-t="habits" onclick="setTab('habits')"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span>Návyky</span></button>
  </div>
</div>
<div id="modal" class="modal-bg hidden" onclick="if(event.target===this)closeModal()"><div class="modal" id="mbody"></div></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
/* ════════ STORAGE & SCHEMA ════════ */
var K={days:'pv4_days',inbody:'pv4_inbody',habits:'pv4_habits',set:'pv4_settings',meta:'pv4_meta'};
function sg(k,fb){try{var v=localStorage.getItem(k);if(v==null)return fb;var p=JSON.parse(v);return p==null?fb:p;}catch(e){return fb;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){toast('Úložiště plné');}}
function getDays(){return sg(K.days,{});}
function setDays(v){ss(K.days,v);}
function getIB(){return sg(K.inbody,[]).slice().sort(function(a,b){return a.date<b.date?-1:1;});}
function setIB(v){ss(K.inbody,v);}
function getHab(ym){var all=sg(K.habits,{});return all[ym]||{names:['Vitaminy','Kreatin','Protein'],marks:{}};}
function setHab(ym,v){var all=sg(K.habits,{});all[ym]=v;ss(K.habits,all);}
function getSet(){return Object.assign({phase:'bulk',targetWeight:84.5,targetFat:13,startWeight:77.9,startDate:'2026-05-10'},sg(K.set,{}));}
function setSet(v){ss(K.set,v);}
var PHASES={
  bulk:{label:'Lean Bulk',bandMin:0.25,bandMax:0.30,dir:1},
  cut:{label:'Mini-cut',bandMin:-0.6,bandMax:-0.4,dir:-1},
  maint:{label:'Maintenance',bandMin:-0.1,bandMax:0.1,dir:0}
};
/* ════════ MIGRATION (Plánovač v3 → v4) ════════ */
function migrate(){
  var meta=sg(K.meta,{});
  if(meta.migrated)return;
  var YEAR=2026,days=getDays();
  function pad(n){return (n<10?'0':'')+n;}
  function iso(m,d){return YEAR+'-'+pad(m+1)+'-'+pad(d);}
  function getSuns(m){var r=[],d=new Date(YEAR,m,1);var skip=d.getDay()===0?0:7-d.getDay();d.setDate(d.getDate()+skip);while(d.getMonth()===m){r.push(d.getDate());d.setDate(d.getDate()+7);}return r;}
  // kalorie
  for(var m=0;m<12;m++){
    var nd=sg('habit_tracker_nutrition_data_'+m,null);
    if(nd){for(var d in nd){var rec=nd[d];if(!rec)continue;var key=iso(m,(+d)+1);var t=days[key]||{};
      var vi=parseInt(rec.kcalIn),vo=parseInt(rec.kcalOut);
      if(!isNaN(vi)&&vi>0&&t.in==null)t.in=vi;
      if(!isNaN(vo)&&vo>0&&t.out==null)t.out=vo;
      days[key]=t;}}
    // tělesné metriky (neděle)
    var bm=sg('habit_tracker_body_metrics_v2_'+m,null);
    if(bm){
      var defs=sg('habit_tracker_metric_definitions',[]),wid='weight',cid='waist';
      for(var i=0;i<defs.length;i++){if((defs[i].label||'').indexOf('Váha')>=0)wid=defs[i].id;if((defs[i].label||'').indexOf('Pas')>=0)cid=defs[i].id;}
      var suns=getSuns(m);
      for(var si in bm){var rec2=bm[si],dd=suns[+si];if(!rec2||!dd)continue;var key2=iso(m,dd),t2=days[key2]||{};
        var w=parseFloat(rec2[wid]),c=parseFloat(rec2[cid]);
        if(!isNaN(w)&&t2.weight==null)t2.weight=w;
        if(!isNaN(c)&&t2.waist==null)t2.waist=c;
        days[key2]=t2;}
    }
    // návyky
    var hn=sg('habit_tracker_habits_'+m,null);
    if(hn&&hn.length){var hd=sg('habit_tracker_data_'+m,{});setHab(YEAR+'-'+pad(m+1),{names:hn,marks:hd});}
  }
  setDays(days);
  // InBody — převzít + doplnit známá měření
  var ib=sg('habit_tracker_inbody_records',[]);
  var seed=[
    {date:'2025-01-16',weight:91.8,fat:18.4,fatKg:16.9,smm:42.9,bmi:27.7,score:89,bmr:1988,water:54.9},
    {date:'2025-05-23',weight:85.8,fat:15.0,fatKg:12.9,smm:42.0,bmi:25.9,score:91,bmr:1946,water:53.5},
    {date:'2025-12-31',weight:88.5,fat:17.4,fatKg:15.4,smm:42.0,bmi:26.7,score:89,bmr:1949,water:53.6},
    {date:'2026-04-03',weight:81.5,fat:11.8,fatKg:9.6,smm:41.2,bmi:24.6,score:90,bmr:1923,water:52.8},
    {date:'2026-05-10',weight:77.9,fat:9.7,fatKg:7.6,smm:40.4,bmi:23.5,score:88,bmr:1889,water:51.6}
  ];
  seed.forEach(function(s){if(!ib.some(function(r){return r.date===s.date;}))ib.push(s);});
  setIB(ib);
  meta.migrated=true;ss(K.meta,meta);
}
/* ════════ DATE & SERIES UTILS ════════ */
var DOW=['Ne','Po','Út','St','Čt','Pá','So'];
var DOW1=['N','P','Ú','S','Č','P','S'];
function pad2(n){return (n<10?'0':'')+n;}
var MON=['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(isoStr,n){var d=new Date(isoStr+'T12:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmt(isoStr){var d=new Date(isoStr+'T12:00:00');return d.getDate()+'. '+MON[d.getMonth()];}
function fmtShort(isoStr){var d=new Date(isoStr+'T12:00:00');return DOW[d.getDay()]+' '+d.getDate()+'.'+(d.getMonth()+1)+'.';}
function dayDiff(a,b){return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);}
function pf(v){if(v==null||v==='')return NaN;return parseFloat(String(v).replace(',','.'));}
// seřazená pole {date, weight/in/out/waist}
function series(field){
  var days=getDays(),out=[];
  Object.keys(days).sort().forEach(function(k){var v=days[k][field];if(v!=null&&v!==''&&!isNaN(pf(v)))out.push({date:k,v:pf(v)});});
  return out;
}
// 7d klouzavý průměr váhy ke konkrétnímu datu (okno date-6..date), min 3 hodnoty
function maAt(ser,dateISO,win){
  win=win||7;var lo=addDays(dateISO,-(win-1)),s=0,n=0;
  for(var i=0;i<ser.length;i++){if(ser[i].date>=lo&&ser[i].date<=dateISO){s+=ser[i].v;n++;}}
  return n>=3?s/n:NaN;
}
// tempo kg/týden z MA: nejdelší dostupné okno 21→14→7 dní
function weeklyRate(ser){
  var t=todayISO();
  var now=maAt(ser,t);if(isNaN(now)){if(!ser.length)return{rate:NaN};now=maAt(ser,ser[ser.length-1].date);t=ser[ser.length-1].date;if(isNaN(now))return{rate:NaN};}
  var spans=[21,14,7];
  for(var i=0;i<spans.length;i++){
    var past=maAt(ser,addDays(t,-spans[i]));
    if(!isNaN(past))return{rate:(now-past)/(spans[i]/7),now:now,span:spans[i]};
  }
  return{rate:NaN,now:now};
}
// adaptivní TDEE z posledních 14 dní
function calcTDEE(){
  var t=todayISO(),lo=addDays(t,-13),days=getDays();
  var sumIn=0,nIn=0;
  for(var k in days){if(k>=lo&&k<=t){var vi=pf(days[k].in);if(!isNaN(vi)&&vi>0){sumIn+=vi;nIn++;}}}
  var ws=series('weight');
  var maNow=maAt(ws,t),maPast=maAt(ws,lo);
  if(nIn<10||isNaN(maNow)||isNaN(maPast))return{ok:false,nIn:nIn,need:10};
  var ratePerWeek=(maNow-maPast)/2;
  var tdee=Math.round(sumIn/nIn-ratePerWeek*7700/7);
  // Garmin průměr ve stejném okně
  var sumOut=0,nOut=0;
  for(var k2 in days){if(k2>=lo&&k2<=t){var vo=pf(days[k2].out);if(!isNaN(vo)&&vo>0){sumOut+=vo;nOut++;}}}
  return{ok:true,tdee:tdee,avgIn:Math.round(sumIn/nIn),garmin:nOut?Math.round(sumOut/nOut):NaN,rate:ratePerWeek,nIn:nIn};
}
// odhad % tuku: poslední InBody + 0,55 × přírůstek
function fatEstimate(){
  var ib=getIB();if(!ib.length)return null;
  var last=ib[ib.length-1];
  var ws=series('weight');if(!ws.length)return{pct:last.fat,base:last,est:false};
  var cw=ws[ws.length-1].v;
  var fatKg=last.fatKg+0.55*(cw-last.weight);
  return{pct:fatKg/cw*100,fatKg:fatKg,weight:cw,base:last,est:true};
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},1700);}
/* SVG helpers */
function linePath(pts){var s='';for(var i=0;i<pts.length;i++)s+=(i?'L':'M')+pts[i][0].toFixed(1)+' '+pts[i][1].toFixed(1);return s;}
function spark(vals,w,h,color){
  if(vals.length<2)return '<svg width="'+w+'" height="'+h+'"></svg>';
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);if(mx-mn<0.001){mx+=0.5;mn-=0.5;}
  var pad=2,pts=vals.map(function(v,i){return[pad+i*(w-2*pad)/(vals.length-1),h-pad-(v-mn)/(mx-mn)*(h-2*pad)];});
  return '<svg width="100%" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><path d="'+linePath(pts)+'" fill="none" stroke="'+color+'" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/><circle cx="'+pts[pts.length-1][0]+'" cy="'+pts[pts.length-1][1]+'" r="2.4" fill="'+color+'"/></svg>';
}

/* ════════ DNES ════════ */
function logStreak(){
  var days=getDays(),n=0,d=todayISO();
  if(!days[d]||pf(days[d].in)>0===false)d=addDays(d,-1); // dnešek se nepočítá proti, dokud není zapsán
  while(days[d]&&pf(days[d].in)>0){n++;d=addDays(d,-1);}
  return n;
}
function rToday(){
  var days=getDays(),d=S.date,rec=days[d]||{};
  var isToday=d===todayISO();
  var streak=logStreak();
  var st=getSet(),ph=PHASES[st.phase];
  var h='<div class="stepper">'
    +'<button class="arr" onclick="stepDay(-1)">‹</button>'
    +'<div class="lbl"><b>'+(isToday?'Dnes':DOW[new Date(d+'T12:00:00').getDay()])+'</b><span>'+fmt(d)+(streak>1?' · <span class="brass">🔥 '+streak+' dní v řadě</span>':'')+'</span></div>'
    +'<button class="arr" onclick="stepDay(1)" '+(isToday?'disabled':'')+'>›</button></div>';
  h+='<div class="grid2" style="margin-bottom:10px;">'
    +'<div class="field f-in"><label>Příjem kcal</label><input type="number" inputmode="numeric" id="f-in" placeholder="0" value="'+(rec.in!=null?rec.in:'')+'"></div>'
    +'<div class="field f-out"><label>Výdej · Garmin</label><input type="number" inputmode="numeric" id="f-out" placeholder="0" value="'+(rec.out!=null?rec.out:'')+'"></div>'
    +'<div class="field"><label>Váha kg</label><input type="text" inputmode="decimal" id="f-weight" placeholder="—" value="'+(rec.weight!=null?String(rec.weight).replace('.',','):'')+'"></div>'
    +'<div class="field"><label>Pas cm</label><input type="text" inputmode="decimal" id="f-waist" placeholder="—" value="'+(rec.waist!=null?String(rec.waist).replace('.',','):'')+'"></div>'
    +'</div>';
  // denní bilance
  var vi=pf(rec.in),vo=pf(rec.out);
  if(!isNaN(vi)&&vi>0&&!isNaN(vo)&&vo>0){
    var bal=vi-vo;
    var good=ph.dir>0?bal>0:ph.dir<0?bal<0:Math.abs(bal)<200;
    h+='<div class="card" style="display:flex;align-items:baseline;justify-content:space-between;padding:13px 16px;">'
      +'<span class="sub">Bilance dne</span>'
      +'<span class="num mid" style="color:'+(good?'var(--brass)':'var(--red)')+'">'+(bal>0?'+':'')+bal+' <span class="unit">kcal</span></span></div>';
  }
  // posledních 7 dní
  h+='<div class="card"><div class="card-t">Posledních 7 dní</div>';
  var any=false;
  for(var i=1;i<=7;i++){
    var dd=addDays(todayISO(),-i),r2=days[dd];
    if(!r2)continue;
    var i2=pf(r2.in),o2=pf(r2.out),w2=pf(r2.weight);
    if(isNaN(i2)&&isNaN(o2)&&isNaN(w2))continue;
    any=true;
    var b2=(!isNaN(i2)&&!isNaN(o2))?i2-o2:NaN;
    h+='<div class="row"><span class="rl">'+fmtShort(dd)+'</span>'
      +'<span class="rv mut" style="font-weight:500;font-size:12px;">'+(isNaN(i2)?'—':'<span class="brass">'+i2+'</span>')+' / '+(isNaN(o2)?'—':'<span class="blue">'+o2+'</span>')+'</span>'
      +'<span class="rv">'+(isNaN(b2)?'':'<span class="'+(b2>0?'brass':'blue')+'">'+(b2>0?'+':'')+b2+'</span>')+(isNaN(w2)?'':' <span class="mut" style="font-weight:500;">·</span> '+w2.toFixed(1))+'</span></div>';
  }
  if(!any)h+='<div class="sub">Zatím žádné záznamy. Začni dnešním dnem nahoře.</div>';
  h+='</div>';
  h+='<button class="btn btn-ghost btn-full" onclick="setTab(\'calendar\')">📅 Celý kalendář měsíce</button>';
  h+='<button class="btn btn-ghost btn-full" onclick="openImport()">Vložit export z Claude / Notionu</button>';
  return h;
}
function stepDay(n){var nd=addDays(S.date,n);if(nd>todayISO())return;S.date=nd;render();}
function saveField(field,val){
  var days=getDays(),rec=days[S.date]||{};
  if(val===''||val==null){delete rec[field];}
  else{var v=field==='in'||field==='out'?parseInt(val):pf(val);if(isNaN(v))return;rec[field]=v;}
  if(Object.keys(rec).length)days[S.date]=rec;else delete days[S.date];
  setDays(days);
}

var CAL_MON=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
function calStep(n){
  var y=+S.calMonth.slice(0,4),m=+S.calMonth.slice(5,7)-1+n;
  var d=new Date(y,m,1),nym=d.getFullYear()+'-'+pad2(d.getMonth()+1);
  if(nym>todayISO().slice(0,7))return;
  S.calMonth=nym;render();
}
function jumpDay(key){S.date=key;setTab('today');}
function rCalendar(){
  var ym=S.calMonth,y=+ym.slice(0,4),mo=+ym.slice(5,7)-1;
  var dim=new Date(y,mo+1,0).getDate(),days=getDays(),t=todayISO();
  var h='<div class="back-row"><button class="arr" style="width:32px;height:32px;font-size:17px;" onclick="setTab(\'today\')">‹</button><div class="card-t" style="margin:0;">Zpět na dnešek</div></div>';
  h+='<div class="stepper">'
    +'<button class="arr" onclick="calStep(-1)">‹</button>'
    +'<div class="lbl"><b>'+CAL_MON[mo]+' '+y+'</b><span id="calCount"></span></div>'
    +'<button class="arr" onclick="calStep(1)" '+(ym>=t.slice(0,7)?'disabled':'')+'>›</button></div>';
  h+='<div class="card" style="padding:12px 10px;overflow-x:auto;">';
  h+='<table class="cal-table"><thead><tr><th>Den</th><th>Příjem</th><th>Výdej</th><th>Bilance</th><th>Váha</th></tr></thead><tbody>';
  var sumIn=0,nIn=0,sumOut=0,nOut=0,logged=0,total=0;
  for(var d=1;d<=dim;d++){
    var key=y+'-'+pad2(mo+1)+'-'+pad2(d);
    if(key>t)break;
    total++;
    var rec=days[key]||{};
    var vi=pf(rec.in),vo=pf(rec.out),vw=pf(rec.weight);
    var hasAny=!isNaN(vi)||!isNaN(vo)||!isNaN(vw);
    if(hasAny)logged++;
    if(!isNaN(vi)){sumIn+=vi;nIn++;}
    if(!isNaN(vo)){sumOut+=vo;nOut++;}
    var bal=(!isNaN(vi)&&!isNaN(vo))?vi-vo:NaN;
    var dow=DOW1[new Date(key+'T12:00:00').getDay()];
    var isToday=key===t;
    h+='<tr class="'+(isToday?'cal-row-today':'')+'" onclick="jumpDay(\''+key+'\')">'
      +'<td>'+d+'. <span class="cal-dow">'+dow+'</span></td>'
      +'<td>'+(isNaN(vi)?'<span class="cal-empty">—</span>':vi)+'</td>'
      +'<td>'+(isNaN(vo)?'<span class="cal-empty">—</span>':vo)+'</td>'
      +'<td>'+(isNaN(bal)?'<span class="cal-empty">—</span>':'<span class="'+(bal>0?'brass':'blue')+'">'+(bal>0?'+':'')+bal+'</span>')+'</td>'
      +'<td>'+(isNaN(vw)?'<span class="cal-empty">—</span>':vw.toFixed(1))+'</td>'
      +'</tr>';
  }
  h+='</tbody></table></div>';
  h+='<div class="card"><div class="card-t">Měsíční průměr</div><div class="grid2">'
    +'<div><div class="sub">Příjem</div><span class="num mid">'+(nIn?Math.round(sumIn/nIn):'—')+'<span class="unit"> kcal</span></span></div>'
    +'<div><div class="sub">Výdej</div><span class="num mid">'+(nOut?Math.round(sumOut/nOut):'—')+'<span class="unit"> kcal</span></span></div>'
    +'</div><div class="sub" style="margin-top:9px;">'+logged+' / '+total+' dní zalogováno · klepnutím na řádek upravíš den</div></div>';
  setTimeout(function(){var el=document.getElementById('calCount');if(el)el.textContent=logged+'/'+total+' dní';},0);
  return h;
}

/* coaching bannery — zrcadlí přísná pravidla Nutrition promptu (tempo + strop tuku) */
function coachBanners(st,ph,pr,fe){
  var out='';
  var td=calcTDEE();
  // 1) tempo vs pásmo (jen bulk/cut, s reálným tempem)
  if(pr&&!isNaN(pr.rate)&&ph.dir!==0){
    var r=pr.rate;
    if(ph.dir>0){ // bulk
      if(r>ph.bandMax){
        var over=r-ph.bandMax, cut=Math.round(over*1100/7/10)*10; // kg/týd → kcal/den
        var hard=r>0.45;
        out+=ban(hard?'warn':'warn','📈','<b>+'+r.toFixed(2)+' kg/týd — nad pásmem '+ph.bandMin.toFixed(2)+'–'+ph.bandMax.toFixed(2)+'.</b> '+(hard?'Tímhle tempem spálíš rezervu do stropu 13 % za pár týdnů s mizerným poměrem sval:tuk. ':'Přebytek jde do tuku. ')+(td.ok?'Uber ~<b>'+cut+' kcal/den</b> ('+(td.tdee+Math.round(ph.bandMin*1100))+'–'+(td.tdee+Math.round(ph.bandMax*1100))+' kcal).':'Uber ~<b>'+cut+' kcal/den</b>.'));
      }else if(r<ph.bandMin-0.05){
        out+=ban('note','📉','<b>'+(r>0?'+':'')+r.toFixed(2)+' kg/týd — pod pásmem.</b> Sval poroste pomaleji, než může. '+(td.ok?'Přidej ~<b>150 kcal/den</b> ('+(td.tdee+Math.round(ph.bandMin*1100))+'–'+(td.tdee+Math.round(ph.bandMax*1100))+' kcal).':'Přidej ~<b>150 kcal/den</b>.'));
      }
    }else if(ph.dir<0){ // cut
      if(r>ph.bandMax){
        out+=ban('warn','🛑','<b>Cut nesedí — '+(r>0?'+':'')+r.toFixed(2)+' kg/týd.</b> Drž deficit tvrdě, ztrácíš čas a riskuješ svalovou ztrátu bez výsledku.');
      }
    }
  }
  // 2) strop tuku (jen bulk)
  if(fe&&ph.dir>0){
    if(fe.pct>=st.targetFat){
      out+=ban('warn','🛑','<b>Odhad '+fe.pct.toFixed(1)+ ' % — strop '+st.targetFat+' % dosažen.</b> Naplánuj InBody přeměření a řeš přechod na mini-cut. Dál naslepo nejedeme.');
    }else if(fe.pct>=st.targetFat-0.5){
      out+=ban('note','📋','<b>Odhad '+fe.pct.toFixed(1)+' % — blížíš se stropu '+st.targetFat+' %.</b> Naplánuj InBody přeměření, ať přechod na mini-cut sedí na měření, ne na odhad.');
    }
  }
  // 3) data gap — chybí dnešní/včerejší váha
  var ws=series('weight');
  if(ws.length){
    var last=ws[ws.length-1].date, gap=dayDiff(last,todayISO());
    if(gap>=2)out+=ban('note','⚖️','<b>'+gap+' dní bez vážení.</b> Adaptivní TDEE i trend potřebují denní ranní váhu — bez ní řídím naslepo.');
  }
  return out;
}
function ban(type,ico,txt){return '<div class="banner ban-'+type+'"><span class="b-ico">'+ico+'</span><span class="b-txt">'+txt+'</span></div>';}
function projection(){
  var st=getSet(),ws=series('weight');
  var wr=weeklyRate(ws);
  if(isNaN(wr.rate)||isNaN(wr.now))return null;
  var ph=PHASES[st.phase];
  var remain=st.targetWeight-wr.now;
  if(ph.dir!==0&&remain*ph.dir<=0)return{done:true,now:wr.now,rate:wr.rate};
  if(wr.rate*ph.dir<=0.02)return{stalled:true,now:wr.now,rate:wr.rate};
  var weeks=remain/wr.rate;
  return{date:addDays(todayISO(),Math.round(weeks*7)),now:wr.now,rate:wr.rate,weeks:weeks};
}
function rTrend(){
  var st=getSet(),ph=PHASES[st.phase],ws=series('weight');
  var pr=projection(),fe=fatEstimate();
  var h='';
  h+=coachBanners(st,ph,pr,fe);
  /* ── Fázová kolejnice (signature) ── */
  var start=st.startWeight,goal=st.targetWeight;
  var cur=pr?pr.now:(ws.length?ws[ws.length-1].v:NaN);
  var prog=!isNaN(cur)?Math.max(0,Math.min(1,(cur-start)/(goal-start))):0;
  h+='<div class="card rail-wrap">';
  h+='<div class="rail-meta"><div><div class="card-t" style="margin-bottom:4px;">'+ph.label+' → '+st.targetFat+' % tuku</div>'
    +'<span class="num big">'+(isNaN(cur)?'—':cur.toFixed(1))+'<span class="unit"> / '+goal.toFixed(1)+' kg</span></span></div>'
    +'<div style="text-align:right;"><div class="sub">cesta</div><span class="num mid brass">'+Math.round(prog*100)+' %</span></div></div>';
  // rail SVG: 340 × 46, čára y=20
  var RW=340,ry=20,x0=10,x1=RW-10;
  var px=x0+prog*(x1-x0);
  var ib=getIB(),dia='';
  ib.forEach(function(r){
    var p=(r.weight-start)/(goal-start);
    if(p<-0.02||p>1.02)return;
    var x=x0+Math.max(0,Math.min(1,p))*(x1-x0);
    dia+='<rect x="'+(x-3.2).toFixed(1)+'" y="'+(ry-3.2)+'" width="6.4" height="6.4" transform="rotate(45 '+x.toFixed(1)+' '+ry+')" fill="var(--s3)" stroke="var(--dim)" stroke-width="1"/>';
  });
  h+='<svg class="rail-svg" viewBox="0 0 '+RW+' 46">'
    +'<line x1="'+x0+'" y1="'+ry+'" x2="'+x1+'" y2="'+ry+'" stroke="var(--line2)" stroke-width="2" stroke-linecap="round"/>'
    +'<line x1="'+x0+'" y1="'+ry+'" x2="'+px.toFixed(1)+'" y2="'+ry+'" stroke="var(--brass)" stroke-width="2.5" stroke-linecap="round"/>'
    +dia
    +'<circle cx="'+px.toFixed(1)+'" cy="'+ry+'" r="6" fill="var(--brass)" stroke="#04201c" stroke-width="2"/>'
    +'<circle cx="'+x1+'" cy="'+ry+'" r="3" fill="none" stroke="var(--brass-line)" stroke-width="1.5"/>'
    +'</svg>';
  var projTxt=pr?(pr.done?'cíl dosažen — přeměř InBody':pr.stalled?'trend stojí — projekce nedostupná':'projekce: ~'+fmt(pr.date)):'sbírám data';
  h+='<div class="rail-foot"><span>'+start.toFixed(1)+' kg · '+fmt(st.startDate)+'</span><span class="brass">'+projTxt+'</span></div>';
  h+='</div>';
  /* ── Tempo + odhad tuku ── */
  var rateTxt='—',rateCls='d-neu';
  if(pr&&!isNaN(pr.rate)){
    var inBand=pr.rate>=ph.bandMin&&pr.rate<=ph.bandMax;
    rateTxt=(pr.rate>0?'+':'')+pr.rate.toFixed(2);
    rateCls=inBand?'d-good':'d-bad';
  }
  h+='<div class="grid2" style="margin-bottom:12px;">';
  h+='<div class="card" style="margin:0;"><div class="card-t">Tempo</div><span class="num mid">'+rateTxt+'<span class="unit"> kg/týd</span></span>'
    +'<div style="margin-top:7px;"><span class="delta '+rateCls+'">pásmo '+(ph.bandMin>0?'+':'')+ph.bandMin.toFixed(2)+' až '+(ph.bandMax>0?'+':'')+ph.bandMax.toFixed(2)+'</span></div></div>';
  h+='<div class="card" style="margin:0;"><div class="card-t">Odhad tuku</div>';
  if(fe){h+='<span class="num mid">'+fe.pct.toFixed(1)+'<span class="unit"> %</span></span>'
    +'<div style="margin-top:7px;"><span class="delta '+(fe.pct>=st.targetFat-0.5?'d-bad':'d-neu')+'">strop '+st.targetFat+' % · InBody '+fmt(fe.base.date)+'</span></div>';}
  else h+='<span class="sub">žádné InBody měření</span>';
  h+='</div></div>';
  /* ── Váhový graf ── */
  h+='<div class="card"><div class="card-t">Váha<div class="chips">'
    +['1m','3m','vse'].map(function(r){return '<button class="chip'+(S.range===r?' on':'')+'" onclick="S.range=\''+r+'\';render()">'+(r==='vse'?'Vše':r.toUpperCase())+'</button>';}).join('')
    +'</div></div>';
  h+=weightChart(ws,st,ph);
  h+='</div>';
  /* ── TDEE ── */
  var td=calcTDEE();
  h+='<div class="card"><div class="card-t">Energetická bilance · 14 dní</div>';
  if(td.ok){
    var surplus=ph.dir>0?' Pro tempo '+ph.bandMin.toFixed(2)+'–'+ph.bandMax.toFixed(2)+' kg/týd jez <b class="brass">'+(td.tdee+Math.round(ph.bandMin*1100))+'–'+(td.tdee+Math.round(ph.bandMax*1100))+' kcal</b>.':ph.dir<0?' Pro tempo cutu jez <b class="brass">'+(td.tdee+Math.round(ph.bandMin*1100))+'–'+(td.tdee+Math.round(ph.bandMax*1100))+' kcal</b>.':'';

function weightChart(ws,st,ph){
  var t=todayISO(),lo=S.range==='1m'?addDays(t,-30):S.range==='3m'?addDays(t,-91):'0000';
  var pts=ws.filter(function(p){return p.date>=lo;});
  if(pts.length<2)return '<div class="sub">Málo dat pro graf — zapisuj váhu denně.</div>';
  var W=340,H=170,padL=30,padR=10,padT=12,padB=18;
  var d0=pts[0].date,span=Math.max(1,dayDiff(d0,t));
  var vals=pts.map(function(p){return p.v;});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  if(st.targetWeight>mn-2&&st.targetWeight<mx+2){mn=Math.min(mn,st.targetWeight);mx=Math.max(mx,st.targetWeight);}
  var pad=(mx-mn)*0.12+0.3;mn-=pad;mx+=pad;
  function X(dt){return padL+dayDiff(d0,dt)/span*(W-padL-padR);}
  function Y(v){return padT+(1-(v-mn)/(mx-mn))*(H-padT-padB);}
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block;">';
  // mřížka
  for(var g=0;g<4;g++){var gv=mn+(mx-mn)*g/3,gy=Y(gv);
    svg+='<line x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+gy.toFixed(1)+'" stroke="var(--line)" stroke-width="1"/>'
      +'<text x="2" y="'+(gy+3).toFixed(1)+'" font-size="8.5" fill="var(--dim)" font-family="Archivo">'+gv.toFixed(1)+'</text>';}
  // cílová váha
  if(st.targetWeight>mn&&st.targetWeight<mx){var ty=Y(st.targetWeight);
    svg+='<line x1="'+padL+'" y1="'+ty.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+ty.toFixed(1)+'" stroke="var(--brass-line)" stroke-width="1.2" stroke-dasharray="4 4"/>'
      +'<text x="'+(W-padR)+'" y="'+(ty-4).toFixed(1)+'" font-size="8.5" fill="var(--brass)" text-anchor="end" font-family="Archivo">cíl '+st.targetWeight.toFixed(1)+'</text>';}
  // raw body
  pts.forEach(function(p){svg+='<circle cx="'+X(p.date).toFixed(1)+'" cy="'+Y(p.v).toFixed(1)+'" r="2" fill="var(--dim)" opacity=".55"/>';});
  // 7d MA
  var maPts=[];
  pts.forEach(function(p){var m=maAt(ws,p.date);if(!isNaN(m))maPts.push([X(p.date),Y(m)]);});
  if(maPts.length>1)svg+='<path d="'+linePath(maPts)+'" fill="none" stroke="var(--brass)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>';
  if(maPts.length)svg+='<circle cx="'+maPts[maPts.length-1][0].toFixed(1)+'" cy="'+maPts[maPts.length-1][1].toFixed(1)+'" r="3.4" fill="var(--brass)" stroke="#04201c" stroke-width="1.5"/>';
  svg+='</svg>';
  svg+='<div class="sub" style="display:flex;gap:14px;margin-top:6px;"><span><span style="display:inline-block;width:9px;height:2.5px;background:var(--brass);border-radius:2px;vertical-align:middle;"></span> 7denní průměr</span><span><span style="display:inline-block;width:5px;height:5px;background:var(--dim);border-radius:50%;vertical-align:middle;"></span> denní vážení</span></div>';
  return svg;
}

function habStreak(hab,hi,dim,todayIdx){
  var n=0;
  for(var d=todayIdx;d>=0;d--){
    var s=hab.marks[hi+'-'+d];
    if(s==='done')n++;
    else if(d===todayIdx&&!s)continue; // dnešek ještě nemusí být odškrtnutý
    else break;
  }
  return n;
}
function rHabits(){
  var ym=S.habMonth,hab=getHab(ym);
  var y=+ym.slice(0,4),mo=+ym.slice(5,7)-1;
  var dim=new Date(y,mo+1,0).getDate();
  var isCur=ym===todayISO().slice(0,7);
  var todayIdx=isCur?new Date().getDate()-1:dim-1;
  if(S.habDay.slice(0,7)!==ym)S.habDay=ym+'-'+String(Math.min(todayIdx+1,dim)).padStart(2,'0');
  var selIdx=+S.habDay.slice(8)-1;
  var monNames=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
  var h='<div class="stepper">'
    +'<button class="arr" onclick="habMonth(-1)">‹</button>'
    +'<div class="lbl"><b>'+monNames[mo]+' '+y+'</b><span>'+hab.names.length+' návyků</span></div>'
    +'<button class="arr" onclick="habMonth(1)">›</button></div>';
  /* prstence */
  var CX=160,CY=160,R0=44,TW=Math.min(26,(116)/Math.max(1,hab.names.length));
  var APD=358/dim;
  function pol(r,deg){var rad=(deg-90)*Math.PI/180;return[CX+r*Math.cos(rad),CY+r*Math.sin(rad)];}
  function seg(r0,r1,a0,a1){
    var p1=pol(r1,a0),p2=pol(r1,a1),p3=pol(r0,a1),p4=pol(r0,a0);
    return 'M'+p1[0].toFixed(1)+' '+p1[1].toFixed(1)+' A'+r1+' '+r1+' 0 0 1 '+p2[0].toFixed(1)+' '+p2[1].toFixed(1)
      +' L'+p3[0].toFixed(1)+' '+p3[1].toFixed(1)+' A'+r0+' '+r0+' 0 0 0 '+p4[0].toFixed(1)+' '+p4[1].toFixed(1)+' Z';
  }
  var svg='';
  var streaks=hab.names.map(function(_,hi){return habStreak(hab,hi,dim,todayIdx);});
  for(var hi=0;hi<hab.names.length;hi++){
    var r0=R0+(hab.names.length-1-hi)*TW,r1=r0+TW-2;
    for(var d=0;d<dim;d++){
      var s=hab.marks[hi+'-'+d],a0=d*APD+1,a1=(d+1)*APD-0.4;
      var inStreak=s==='done'&&streaks[hi]>0&&d>todayIdx-streaks[hi]&&d<=todayIdx;
      var fill=s==='done'?'var(--brass)':s==='fail'?'rgba(154,169,187,.4)':'var(--s2)';
      var stroke=inStreak&&streaks[hi]>=7?'var(--gold)':d===selIdx?'var(--ink)':'transparent';
      var op=(isCur&&d>todayIdx)?0.35:1;
      svg+='<path d="'+seg(r0,r1,a0,a1)+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1.2" opacity="'+op+'" data-h="'+hi+'" data-d="'+d+'" class="hseg" style="cursor:pointer;"/>';
    }
  }
  // střed: % splnění měsíce
  var done=0,total=hab.names.length*(todayIdx+1);
  for(var k in hab.marks)if(hab.marks[k]==='done'){var dd2=+k.split('-')[1];if(dd2<=todayIdx)done++;}
  var pct=total?Math.round(done/total*100):0;
  svg+='<text x="'+CX+'" y="'+(CY-2)+'" text-anchor="middle" font-size="26" font-weight="800" font-family="Archivo" fill="var(--ink)">'+pct+'<tspan font-size="12" fill="var(--mut)">%</tspan></text>';
  svg+='<text x="'+CX+'" y="'+(CY+16)+'" text-anchor="middle" font-size="9" fill="var(--dim)" font-family="Instrument Sans">měsíc</text>';
  h+='<div class="card" style="padding:10px;"><div class="ring-wrap"><svg viewBox="0 0 320 320" style="width:100%;display:block;">'+svg+'</svg></div></div>';
  /* vybraný den */
  h+='<div class="card"><div class="card-t"><span>'+fmtShort(S.habDay)+'</span><span class="chips">'
    +'<button class="chip" onclick="habDayStep(-1)">‹</button><button class="chip" onclick="habDayStep(1)">›</button></span></div>';
  hab.names.forEach(function(name,hi){
    var s=hab.marks[hi+'-'+selIdx];
    var stk=streaks[hi];
    h+='<div class="h-row" onclick="cycleHab('+hi+')"><div style="display:flex;align-items:center;gap:9px;flex:1;">'
      +'<div class="h-check '+(s==='done'?'dn':s==='fail'?'fl':'')+'">'+(s==='done'?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#04201c" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':s==='fail'?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>':'')+'</div>'
      +'<input class="h-name-inp" value="'+name.replace(/"/g,'&quot;')+'" data-hi="'+hi+'" onclick="event.stopPropagation()" maxlength="22">'
      +'</div>'+(stk>=3?'<span class="delta '+(stk>=7?'d-up':'d-neu')+'">'+(stk>=7?'🔥 ':'')+stk+'d</span>':'')+'</div>';
  });
  h+='<div style="display:flex;gap:8px;margin-top:8px;">'
    +'<button class="btn btn-ghost" style="flex:1;" onclick="addHabit()">+ návyk</button>'
    +'<button class="btn btn-ghost" style="flex:1;" onclick="rmHabit()">− poslední</button></div>';
  h+='</div>';
  return h;
}

function openImport(){
  var h='<h2>Import dat<button onclick="closeModal()">✕</button></h2>'
    +'<div class="note">Vlož JSON ve formátu:<br><code>[{"date":"2026-06-11","kcalIn":2750,"kcalOut":2900,"weight":80.4,"waist":82}]</code><br>V Claude (Nutrition projekt) řekni „export pro plánovač". Ruční záznamy mají přednost — import jen doplní chybějící.</div>'
    +'<textarea class="ta" id="imp-ta" placeholder="[{...}]"></textarea>'
    +'<div style="height:10px;"></div><button class="btn btn-brass btn-full" onclick="runImport()">Importovat</button>';
  showModal(h);
}
function runImport(){
  var raw=document.getElementById('imp-ta').value.trim();
  try{
    var arr=JSON.parse(raw);if(!Array.isArray(arr))throw 0;
    var days=getDays(),n=0;
    arr.forEach(function(r){
      if(!r||!r.date||!/^\d{4}-\d{2}-\d{2}$/.test(r.date))return;
      var t=days[r.date]||{};
      var map={in:r.kcalIn!=null?r.kcalIn:r.in,out:r.kcalOut!=null?r.kcalOut:r.out,weight:r.weight,waist:r.waist};
      var ch=false;
      for(var f in map){var v=pf(map[f]);if(!isNaN(v)&&v>0&&t[f]==null){t[f]=f==='in'||f==='out'?Math.round(v):v;ch=true;}}
      if(ch){days[r.date]=t;n++;}
    });
    setDays(days);closeModal();render();toast('Doplněno '+n+' dní');
  }catch(e){toast('Neplatný JSON');}
}
function doExport(){
  var dump={};
  Object.keys(K).forEach(function(x){var v=localStorage.getItem(K[x]);if(v!=null)dump[K[x]]=v;});
  var b=new Blob([JSON.stringify(dump,null,1)],{type:'application/json'});
  var u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='planovac_'+todayISO()+'.json';a.click();URL.revokeObjectURL(u);
  var meta=sg(K.meta,{});meta.lastBackup=new Date().toISOString();ss(K.meta,meta);
  toast('Záloha stažena');
}
function doImportFile(file){
  if(!file)return;
  var r=new FileReader();
  r.onload=function(e){try{var d=JSON.parse(e.target.result);
    Object.keys(d).forEach(function(k){if(k.indexOf('pv4_')===0)localStorage.setItem(k,d[k]);});
    location.reload();
  }catch(ex){toast('Chybný soubor');}};
  r.readAsText(file);
}
/* ════════ BINDINGS & BOOT ════════ */
function bind(){
  ['in','out','weight','waist'].forEach(function(f){
    var el=document.getElementById('f-'+f);
    if(el)el.addEventListener('input',function(){saveField(f,this.value);clearTimeout(el._h);var self=this;el._h=setTimeout(function(){if(document.activeElement===self)self.blur();var d=getDays()[S.date];if(d&&(d.in!=null&&d.out!=null||f==='weight'))render();},1400);});
  });
  document.querySelectorAll('.hseg').forEach(function(p){
    p.addEventListener('click',function(){
      var hi=+this.dataset.h,d=+this.dataset.d;
      S.habDay=S.habMonth+'-'+String(d+1).padStart(2,'0');
      var hab=getHab(S.habMonth),k=hi+'-'+d,cur=hab.marks[k];
      hab.marks[k]=!cur?'done':cur==='done'?'fail':null;
      if(!hab.marks[k])delete hab.marks[k];
      setHab(S.habMonth,hab);render();
    });
  });
  document.querySelectorAll('.h-name-inp').forEach(function(inp){
    inp.addEventListener('input',function(){var hab=getHab(S.habMonth);hab.names[+this.dataset.hi]=this.value;setHab(S.habMonth,hab);});
  });
}
migrate();
render();
</script>
